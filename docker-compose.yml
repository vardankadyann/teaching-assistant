services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - backend/.env
    environment:
      CHROMA_PERSIST_DIR: /data/chroma
      HF_CACHE_DIR: /data/huggingface
      CORS_ORIGINS: http://localhost:8000,http://127.0.0.1:8000
    volumes:
      - teaching-assistant-data:/data
    restart: unless-stopped

volumes:
  teaching-assistant-data:
