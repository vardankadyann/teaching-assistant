# Render Blueprint: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: teaching-assistant
    runtime: docker
    plan: starter
    healthCheckPath: /api/health
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: CHROMA_PERSIST_DIR
        value: /data/chroma
      - key: HF_CACHE_DIR
        value: /data/huggingface
      - key: CORS_ORIGINS
        sync: false
    disk:
      name: teaching-assistant-data
      mountPath: /data
      sizeGB: 1
