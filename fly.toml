# fly launch  (then: fly secrets set OPENAI_API_KEY=sk-...)
app = "teaching-assistant"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

[env]
  CHROMA_PERSIST_DIR = "/data/chroma"
  HF_CACHE_DIR = "/data/huggingface"
  PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    path = "/api/health"
    interval = "30s"
    timeout = "10s"
    grace_period = "120s"

[[mounts]]
  source = "teaching_assistant_data"
  destination = "/data"

[[vm]]
  memory = "2gb"
  cpu_kind = "shared"
  cpus = 2
